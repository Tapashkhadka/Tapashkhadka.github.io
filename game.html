<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="A small HTML, CSS, and JavaScript browser game by Tapash Khadka." />
    <meta name="theme-color" content="#08090b" />
    <title>Game — Tapash Khadka</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="arcade-body">
    <main class="arcade-shell" id="arcadeShell">
      <section class="arcade-stage" aria-label="Fullscreen arcade">
        <div class="arcade-topbar">
          <a class="arcade-home" href="index.html" aria-label="Back to portfolio">← Portfolio</a>
          <div class="game-tabs" aria-label="Choose game">
            <button class="active" data-game="runner" type="button">Runner</button>
            <button data-game="flappy" type="button">Flap</button>
            <button data-game="pong" type="button">Pong</button>
            <button data-game="snake" type="button">Snake</button>
            <button data-game="breakout" type="button">Breakout</button>
            <button data-game="catcher" type="button">Catch</button>
            <button data-game="shooter" type="button">Shooter</button>
            <button data-game="reflex" type="button">Reflex</button>
          </div>
          <button class="arcade-icon-btn" id="fullscreenBtn" type="button" aria-label="Enter fullscreen">⛶</button>
        </div>

        <div class="arcade-hud" aria-live="polite">
          <div><span>Score</span><strong id="score">0</strong></div>
          <div><span>Best</span><strong id="best">0</strong></div>
          <div><span>Level</span><strong id="level">1</strong></div>
        </div>

        <canvas id="gameCanvas" width="720" height="720" aria-label="Arcade game canvas"></canvas>

        <div class="arcade-bottom">
          <div>
            <h1 id="gameTitle">Neon Runner</h1>
            <p id="gameHelp">Drag on mobile, or use arrow keys/WASD. Collect blue sparks and avoid red chasers.</p>
            <p id="gameStatus">Choose a game, then press Start.</p>
          </div>
          <div class="game-controls">
            <button class="btn primary" id="startBtn" type="button">Start</button>
            <button class="btn" id="resetBtn" type="button">Reset</button>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
    <script src="game.js"></script>
  </body>
</html>
